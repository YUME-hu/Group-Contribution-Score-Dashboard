<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小组贡献积分统计系统（6人版）</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:#f7f8fa;margin:0;padding:20px}
.main{max-width:900px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 2px 10px #00000010;padding:24px}
.title{text-align:center;font-size:24px;margin-bottom:20px;color:#333}

.calc-box{
  background:#edf7ff;padding:14px;border-radius:8px;margin-bottom:20px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap
}
.calc-box label{font-weight:bold}
.calc-result{font-size:16px;color:#409eff;font-weight:bold}

.ctrl{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
select,input,button{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px}
button{background:#409eff;color:#fff;border:none;cursor:pointer}
button.red{background:#f56c6c}
button.gray{background:#909393}
button.green{background:#67c23a}

.members{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.member{background:#f8f9fa;padding:14px;border-radius:8px;text-align:center}
.name{font-weight:bold;margin-bottom:6px}
.score{font-size:22px;color:#409eff;font-weight:bold}
.ratio{font-size:12px;color:#666;margin-top:4px}

.rank-box{
  background:#fef5e7;border-radius:8px;padding:14px;margin-bottom:24px
}
.rank-title{
  font-weight:bold;font-size:16px;margin-bottom:10px;color:#e6a23c
}
.rank-item{
  display:flex;justify-content:space-between;padding:6px 10px;border-bottom:1px solid #eee;
}
.rank-item.no1{background:#fff1e0;font-weight:bold;color:#f56c6c}
.rank-item.no2{background:#f9f9f9;color:#409eff}
.rank-item.no3{color:#67c23a}

.log{border-top:1px solid #eee;padding-top:12px;max-height:280px;overflow-y:auto}
.log p{margin:4px 0;font-size:13px;color:#555}
.total{text-align:right;font-weight:bold;margin-bottom:10px;font-size:16px}
</style>
</head>
<body>

<div class="main">
  <div class="title">小组贡献积分统计系统（6人版）</div>

  <div class="calc-box">
    <label>难度等级：</label>
    <select id="level">
      <option value="1">1级 - 简单（×1.0）</option>
      <option value="2">2级 - 中等（×1.5）</option>
      <option value="3">3级 - 困难（×2.0）</option>
      <option value="4">4级 - 专家（×2.5）</option>
      <option value="5">5级 - 关键（×3.0）</option>
    </select>

    <label>预估工时：</label>
    <input type="number" id="hour" value="2" style="width:70px">
    <button onclick="calcScore()">自动计算积分</button>
    <span class="calc-result">本次积分：<span id="scoreResult">0</span></span>
  </div>

  <div class="ctrl">
    <select id="user"></select>
    <button onclick="addCalcScore()">一键加到该成员</button>
    <button onclick="exportCSV()" class="green">导出积分表格</button>
    <button onclick="resetAll()" class="gray">清空所有积分</button>
    <button onclick="clearLog()" class="gray">清空记录</button>
  </div>

  <div class="total">团队总积分：<span id="total">0</span></div>

  <div class="rank-box">
    <div class="rank-title">🏆 贡献积分排行榜</div>
    <div id="rankList"></div>
  </div>

  <div class="members" id="membersBox"></div>
  <div class="log" id="log"></div>
</div>

<script>
// 成员名单
let users = [
  { name: "成员1", score: 0 },
  { name: "成员2", score: 0 },
  { name: "成员3", score: 0 },
  { name: "成员4", score: 0 },
  { name: "成员5", score: 0 },
  { name: "成员6", score: 0 }
]

const levelCoeff = [0, 1.0, 1.5, 2.0, 2.5, 3.0]
let currentScore = 0
let logList = []

// 本地存储
function loadFromLocalStorage() {
  let saved = localStorage.getItem('groupScoreData')
  if (saved) {
    let data = JSON.parse(saved)
    users = data.users || users
    logList = data.logList || []
  }
}

function saveToLocalStorage() {
  localStorage.setItem('groupScoreData', JSON.stringify({ users, logList }))
}

// 初始化下拉
function initSelect() {
  let sel = document.getElementById('user')
  sel.innerHTML = ''
  users.forEach((u, i) => {
    let opt = document.createElement('option')
    opt.value = i
    opt.innerText = u.name
    sel.appendChild(opt)
  })
}

// 计算积分
function calcScore() {
  let level = parseInt(document.getElementById('level').value)
  let hour = parseFloat(document.getElementById('hour').value) || 0
  currentScore = hour * levelCoeff[level]
  document.getElementById('scoreResult').innerText = currentScore.toFixed(1)
}

// 排行榜
function renderRank(){
  let rankList = document.getElementById('rankList')
  rankList.innerHTML = ''
  let sorted = [...users].sort((a,b)=>b.score - a.score)
  sorted.forEach((u,i)=>{
    let div = document.createElement('div')
    let cls = ''
    if(i===0) cls='no1'
    if(i===1) cls='no2'
    if(i===2) cls='no3'
    div.className = `rank-item ${cls}`
    div.innerHTML = `
      <span>${i+1}. ${u.name}</span>
      <span>${u.score.toFixed(1)} 分</span>
    `
    rankList.appendChild(div)
  })
}

// 渲染面板
function render() {
  let box = document.getElementById('membersBox')
  box.innerHTML = ''
  let total = users.reduce((s, u) => s + u.score, 0)
  document.getElementById('total').innerText = total.toFixed(1)

  users.forEach(u => {
    let div = document.createElement('div')
    div.className = 'member'
    let ratio = total > 0 ? ((u.score / total * 100).toFixed(1)) : 0
    div.innerHTML = `
      <div class="name">${u.name}</div>
      <div class="score">${u.score.toFixed(1)}</div>
      <div class="ratio">占比 ${ratio}%</div>
    `
    box.appendChild(div)
  })
  renderRank()
  renderLog()
}

// 日志
function renderLog() {
  document.getElementById('log').innerHTML = logList.map(s => `<p>${s}</p>`).join('')
}

function addLog(text) {
  let time = new Date().toLocaleTimeString()
  logList.unshift(`[${time}] ${text}`)
  saveToLocalStorage()
  renderLog()
}

// 加分
function addCalcScore() {
  if (currentScore <= 0) {
    alert('请先点击【自动计算积分】')
    return
  }
  let idx = document.getElementById('user').value
  users[idx].score += currentScore
  saveToLocalStorage()
  render()
  let level = document.getElementById('level').value
  let hour = document.getElementById('hour').value
  addLog(`${users[idx].name} 完成【${level}级任务·${hour}小时】，获得积分 ${currentScore.toFixed(1)}`)
}

// 清空
function resetAll() {
  users.forEach(u => u.score = 0)
  saveToLocalStorage()
  render()
  addLog("已清空所有成员积分")
}

function clearLog() {
  logList = []
  saveToLocalStorage()
  renderLog()
}

// ====================== 导出表格 ======================
function exportCSV() {
  let total = users.reduce((s, u) => s + u.score, 0)
  let csvContent = "\uFEFF成员积分统计表\n"
  csvContent += "排名,姓名,积分,贡献占比\n"

  let sorted = [...users].sort((a,b)=>b.score-a.score)
  sorted.forEach((u,i)=>{
    let ratio = total>0 ? (u.score/total*100).toFixed(1) : 0
    csvContent += `${i+1},${u.name},${u.score.toFixed(1)},${ratio}%\n`
  })

  csvContent += "\n操作日志\n时间,内容\n"
  logList.forEach(log => {
    csvContent += log.replace(/\[([^\]]+)\]\s*(.+)/, "$1,$2") + "\n"
  })

  let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8' })
  let url = URL.createObjectURL(blob)
  let a = document.createElement('a')
  a.href = url
  let today = new Date().toLocaleDateString().replace(/\//g,'-')
  a.download = `小组积分记录_${today}.csv`
  a.click()
  URL.revokeObjectURL(url)
}

// 启动
loadFromLocalStorage()
initSelect()
calcScore()
render()
</script>
</body>
</html>
